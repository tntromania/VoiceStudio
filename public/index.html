<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { 
                        viralio: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 900: '#09090b', accent: '#ec4899' }
                    },
                    animation: { 'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards' },
                    keyframes: { slideUp: { '0%': { opacity: 0, transform: 'translateY(20px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FAFAFA; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; color: #09090b; }
        .bg-gradient-viralio { background: linear-gradient(135deg, #4f46e5 0%, #ec4899 100%); }
        
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Custom Sliders */
        .viralio-slider { -webkit-appearance: none; width: 100%; background: transparent; position: relative; z-index: 10; cursor: pointer; }
        .viralio-slider:focus { outline: none; }
        .viralio-slider::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; }
        .viralio-slider::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: #fff; -webkit-appearance: none; margin-top: -6px; box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25); border: 2px solid #4f46e5; transition: transform 0.1s; }
        .viralio-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
        .slider-progress { position: absolute; top: 12px; left: 0; height: 6px; background: #4f46e5; border-radius: 3px; pointer-events: none; z-index: 5; }

        /* Dropdown Custom */
        .v-dropdown { display: none; opacity: 0; transform: translateY(-10px); transition: all 0.2s ease; }
        .v-dropdown.show { display: block; opacity: 1; transform: translateY(0); }
        
        /* Modals */
        #login-modal { display: none; position: fixed; inset: 0; background: rgba(9, 9, 11, 0.75); backdrop-filter: blur(12px); z-index: 99999; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; }
        #login-modal.show { display: flex; opacity: 1; }
        .modal-content { background: #ffffff; border-radius: 2rem; padding: 40px 24px; text-align: center; max-width: 400px; width: 90%; transform: translateY(30px) scale(0.95); transition: 0.5s; box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.4); }
        #login-modal.show .modal-content { transform: translateY(0) scale(1); }

        /* Loader & EQ */
        .loader { border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        .is-generating .loader { display: block; }
        .is-generating .btn-text { display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .eq-bar { width: 4px; border-radius: 2px; background: #ec4899; height: 4px; transition: height 0.1s; }
        .playing .eq-bar { animation: eqBounce 0.8s ease-in-out infinite alternate; }
        @keyframes eqBounce { 0% { height: 4px; } 100% { height: 24px; } }
    </style>
</head>

<script>
    // --- 1. AUTH LOGIC ---
    function setToken(token) { document.cookie = "viralio_token=" + token + "; domain=.viralio.ro; path=/; max-age=604800; Secure; SameSite=Lax"; }
    function getToken() { const match = document.cookie.match(/(?:^|; )viralio_token=([^;]*)/); return match ? match[1] : null; }
    function removeToken() { document.cookie = "viralio_token=; domain=.viralio.ro; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT"; }

    function openLoginModal() { document.getElementById('login-modal').classList.add('show'); }
    function closeLoginModal() { document.getElementById('login-modal').classList.remove('show'); }

    window.handleCredentialResponse = async function(response) {
        try {
            const res = await fetch('https://downloader.viralio.ro/api/auth/google', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ credential: response.credential }) });
            const data = await res.json();
            if(data.token) { setToken(data.token); closeLoginModal(); updateUI(data.user); } 
        } catch (e) { alert('Eroare conexiune server.'); }
    }

    function updateUI(user) {
        document.getElementById('guest-nav').classList.add('hidden');
        const userNav = document.getElementById('user-nav');
        userNav.classList.remove('hidden'); userNav.style.display = 'flex';
        document.getElementById('nav-name').innerText = user.name.split(' ')[0];
        document.getElementById('nav-avatar').src = user.picture;
        document.getElementById('nav-credits').innerText = user.credits;
    }

    function logout() { removeToken(); location.reload(); }

    window.onload = async () => {
        updateSlider('stab'); 
        updateSlider('sim');
        
        const token = getToken();
        if(token) {
            try {
                const res = await fetch('https://downloader.viralio.ro/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
                if(res.ok) { const data = await res.json(); updateUI(data.user); } else { removeToken(); }
            } catch (e) {}
        }
    };

    // --- 2. LOGICA SLIDERE (REPARATA) ---
    function updateSlider(id) {
        const val = document.getElementById(`param-${id}`).value;
        // Am corectat ID-ul target-ului pentru a se potrivi cu HTML-ul: stab-val si sim-val
        document.getElementById(`${id}-val`).innerText = val + '%';
        document.getElementById(`prog-${id}`).style.width = val + '%';
    }

    // --- 3. VOCILE PE CATEGORII ---
    const voiceCategories = {
        "Voci Masculine (Povești/Viral)": ["Paul", "Drew", "Clyde", "Dave", "Roger", "Fin", "James", "Bradford", "Reginald", "Austin", "Mark", "Grimblewood"],
        "Voci Feminine (Povești/Viral)": ["Rachel", "Aria", "Domi", "Sarah", "Jane", "Juniper", "Arabella", "Hope", "Blondie", "Priyanka", "Alexandra", "Monika"],
        "Personaje Speciale": ["Gaming", "Kuon"]
    };
    
    let activeVoice = "Paul";
    const listEl = document.getElementById('voice-list');
    const badgeMap = {"Voci Masculine (Povești/Viral)": "MASCULIN", "Voci Feminine (Povești/Viral)": "FEMININ", "Personaje Speciale": "SPECIAL"};

    Object.keys(voiceCategories).forEach(category => {
        const header = document.createElement('div');
        header.className = "px-3 py-2 bg-slate-50 text-[0.65rem] font-bold text-slate-400 uppercase tracking-wider sticky top-0 z-10 border-y border-slate-100 first:border-t-0";
        header.innerText = category;
        listEl.appendChild(header);

        voiceCategories[category].forEach(voice => {
            const div = document.createElement('div');
            div.className = `voice-option px-4 py-2.5 flex items-center gap-3 cursor-pointer text-sm font-bold transition-colors ${voice === 'Paul' ? 'bg-indigo-50 text-indigo-600' : 'text-slate-700 hover:bg-slate-50'}`;
            div.onclick = () => selectVoice(voice, badgeMap[category], div);
            
            const colors = ['bg-slate-900', 'bg-pink-500', 'bg-emerald-500', 'bg-amber-500', 'bg-indigo-500'];
            const color = colors[voice.length % colors.length];

            div.innerHTML = `
                <div class="w-7 h-7 rounded-full ${color} text-white flex items-center justify-center text-[0.6rem] shrink-0">${voice.substring(0,2).toUpperCase()}</div>
                <span>${voice}</span>
            `;
            listEl.appendChild(div);
        });
    });

    function toggleVoiceDropdown() { document.getElementById('voice-dropdown').classList.toggle('show'); }

    function selectVoice(voice, badgeText, element) {
        activeVoice = voice;
        document.getElementById('active-voice-name').innerText = voice;
        document.getElementById('active-voice-avatar').innerText = voice.substring(0,2).toUpperCase();
        document.getElementById('active-voice-badge').innerText = badgeText;
        
        const colors = ['bg-slate-900', 'bg-pink-500', 'bg-emerald-500', 'bg-amber-500', 'bg-indigo-500'];
        document.getElementById('active-voice-avatar').className = `w-8 h-8 rounded-full ${colors[voice.length % colors.length]} flex items-center justify-center text-xs font-bold text-white shadow-md`;

        document.querySelectorAll('.voice-option').forEach(el => { el.classList.remove('bg-indigo-50', 'text-indigo-600'); el.classList.add('text-slate-700'); });
        element.classList.add('bg-indigo-50', 'text-indigo-600');
        element.classList.remove('text-slate-700');
        
        toggleVoiceDropdown();
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('#voice-selector-container')) { document.getElementById('voice-dropdown').classList.remove('show'); }
    });

    // --- 4. EDITOR & CREDITE ---
    const textInput = document.getElementById('script-input');
    
    textInput.addEventListener('input', () => {
        let text = textInput.value;
        if(text.length > 5000) { textInput.value = text.substring(0, 5000); text = textInput.value; }
        
        document.getElementById('char-count').innerText = text.length;
        document.getElementById('char-count').className = text.length > 4500 ? 'text-red-500 font-black' : 'text-viralio-600 font-black';
        
        const cost = text.length === 0 ? 0 : Math.max(1, Math.ceil(text.length / 1000));
        document.getElementById('credit-cost').innerText = cost;
    });

    function clearText() { textInput.value = ''; textInput.dispatchEvent(new Event('input')); }
    async function pasteText() { try { textInput.value += await navigator.clipboard.readText(); textInput.dispatchEvent(new Event('input')); } catch(e){} }

    // --- 5. GENERARE AUDIO ---
    async function processAudio() {
        const token = getToken();
        if(!token) { openLoginModal(); return; }

        const text = textInput.value.trim();
        if(!text) return alert("Scrie text pentru a genera vocea.");

        const btn = document.getElementById('generateBtn');
        btn.classList.add('is-generating');
        btn.disabled = true;

        const cost = Math.max(1, Math.ceil(text.length / 1000));

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ 
                    text: text, 
                    voice: activeVoice,
                    stability: document.getElementById('param-stab').value / 100,
                    similarity_boost: document.getElementById('param-sim').value / 100
                })
            });

            const data = await res.json();
            if(!res.ok) throw new Error(data.error || "Eroare la generare.");

            launchPlayer(data.audioUrl, activeVoice, text);

            const credEl = document.getElementById('nav-credits');
            if(credEl && parseInt(credEl.innerText) >= cost) {
                credEl.innerText = parseInt(credEl.innerText) - cost;
            }

        } catch (e) {
            alert(e.message);
        } finally {
            btn.classList.remove('is-generating');
            btn.disabled = false;
        }
    }

    // --- 6. AUDIO PLAYER ---
    const audio = document.getElementById('core-audio');
    const playerBar = document.getElementById('player-bar');
    const playBtnIcon = document.getElementById('player-play-btn').querySelector('i');
    const trackFill = document.getElementById('track-fill');
    const eqContainer = document.getElementById('eq-container');

    function launchPlayer(url, voiceName, text) {
        audio.src = url;
        document.getElementById('download-btn').href = url;
        document.getElementById('nowPlayingText').innerText = `${voiceName} citește: "${text.substring(0, 30)}..."`;
        playerBar.style.transform = 'translate(-50%, 0)';
        audio.play();
    }

    document.getElementById('player-play-btn').onclick = () => audio.paused ? audio.play() : audio.pause();
    
    audio.onplay = () => { playBtnIcon.className = "fa-solid fa-pause"; eqContainer.classList.add('playing'); };
    audio.onpause = () => { playBtnIcon.className = "fa-solid fa-play ml-1"; eqContainer.classList.remove('playing'); };
    audio.onended = () => { playBtnIcon.className = "fa-solid fa-play ml-1"; eqContainer.classList.remove('playing'); trackFill.style.width = '0%'; };
    
    audio.ontimeupdate = () => { if(audio.duration) trackFill.style.width = (audio.currentTime / audio.duration * 100) + '%'; };
    
    function seekTrack(e) {
        const rect = document.getElementById('track-bg').getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }
</script>
</body>
</html>
